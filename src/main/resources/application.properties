## ============================================================================
##  Sonata API - configuracoes da aplicacao
##  Banco oficial: PostgreSQL.
##  O Spring Data JPA / Hibernate cria e atualiza as tabelas SOZINHO a partir
##  das classes @Entity (ddl-auto=update). Nao eh preciso modelar nada no
##  banco manualmente - basta apontar o DBeaver para localhost:5432.
## ----------------------------------------------------------------------------
##  OBSERVACAO PARA O PROFESSOR:
##  Deixamos abaixo TRES opcoes de configuracao de conexao com o PostgreSQL.
##  Basta DESCOMENTAR APENAS UM dos blocos (OPCAO 1, 2 ou 3) conforme o
##  ambiente em que for executar o projeto. Os outros dois devem ficar
##  comentados. Recomendamos a OPCAO 3 (Docker) por nao exigir instalacao
##  local de PostgreSQL.
## ============================================================================

spring.application.name=sonata-api

## ============================================================================
##  >>> OPCAO 1 - Postgres LOCAL instalado na maquina (sem Docker) <<<
##  Pre-requisitos: PostgreSQL instalado em localhost:5432, com:
##     - database: sonata
##     - usuario : postgres
##     - senha   : senha
##  Subir a API com:  ./mvnw spring-boot:run
## ----------------------------------------------------------------------------
#server.port=8081
#spring.datasource.url=jdbc:postgresql://localhost:5432/sonata
#spring.datasource.username=postgres
#spring.datasource.password=senha

## ============================================================================
##  >>> OPCAO 2 - API rodando LOCAL + Postgres subindo via docker-compose <<<
##  (sobe somente o servico sonata-db do docker-compose e roda a API fora)
##  Comando:  docker compose up -d sonata-db   &&   ./mvnw spring-boot:run
## ----------------------------------------------------------------------------
#server.port=8081
#spring.datasource.url=jdbc:postgresql://localhost:5432/sonata
#spring.datasource.username=sonata
#spring.datasource.password=sonata

## ============================================================================
##  >>> OPCAO 3 - TUDO via Docker (API + Postgres no docker-compose) <<<  [RECOMENDADA]
##  Comando:  docker compose up --build
##  As variaveis SPRING_DATASOURCE_* sao injetadas pelo docker-compose.yml
##  e tem prioridade sobre os defaults abaixo. A porta 8080 eh exposta no host.
## ----------------------------------------------------------------------------
server.port=8080
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sonata}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sonata}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sonata}

## ----------------------------------------------------------------------------
##  JPA / Hibernate
##  ddl-auto=update  -> cria/atualiza tabelas a partir das @Entity (POO -> SQL)
## ----------------------------------------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

## ----------------------------------------------------------------------------
##  Mensagens de erro mais informativas em respostas REST
## ----------------------------------------------------------------------------
server.error.include-message=always
server.error.include-binding-errors=always
